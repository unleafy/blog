[[config.topNav.links]]
label = "Vibe"
href = "/vibe"

[[config.topNav.links]]
label = "About"
href = "/about"

[config.home]
layout = "grid"

[config.home.quote]
text = [
  "End, Begin Repeat"
]
image = ""

[config.home.intro]
title = "here is unleafy"
name = "unleafy"
body = [
  "Welcome.\n",
  "This is my little corner of the Internet—a place for ideas, code, experiments, and unfinished thoughts.",
  "I write about algorithms, Linux, and the things I'm curious enough to dive into.",
  "Every ending marks the beginning of something new."
]
image = "/images/logo.png"

[config.home.latest]
count = 1
heatmapWeeks = 24
showHeatmapLatest = true
excludeDraft = true
startDate = ""
dateArchiveBaseHref = ""

