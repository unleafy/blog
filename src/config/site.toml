[config.site]
title = "Unleafy"
description = "A personal website for recording studies and life."
pageTitle = "Unleafy's Blog"
pageDescription = "A personal website for recording studies and life."
repository = "https://github.com/unleafy/blog"
footerNote = "Powered by Astro and Navfolio."

[config.vibe]
showTrail = true

[config.theme]
# Available palettes:
# green-soft, green-vivid, rose-soft, pink-soft, purple-soft, blue-soft, orange-soft, brown-soft
palette = "orange-soft"

[config.code]
lightTheme = "catppuccin-latte"
darkTheme = "catppuccin-macchiato"
lineNumbers = true
wrap = true
preserveIndent = true
collapseStyle = "collapsible-auto"

[config.math]
render = "katex" # "katex" | "mathjax"

[config.comments]
enabled = true
provider = "waline"
show_on_posts = true

[config.search]
enabled = true
shortcut = "mod+k"
placeholder = "Search notes..."
maxResults = 6

[config.blog]
postsPerPage = 6

[config.comments.giscus]
repo = ""
repo_id = ""
category = ""
category_id = ""
mapping = "pathname"
strict = "0"
reactions_enabled = "1"
emit_metadata = "0"
input_position = "top"
light_theme = "light"
dark_theme = "dark"
lang = "zh-CN"
loading = "lazy"

[config.comments.utterances]
repo = ""
issue_term = "pathname"
label = "comment"
theme = "github-light"

[config.comments.waline]
server_url = "https://comment.unleafy.cn"
lang = "en-US"
dark = "auto"
pageview = true
comment = true

[config.profile]
name = "unleafy"
handle = "@unleafy"
role = "An OIer and Student"
company = "None"
location = "Remote"
email = "unleafy0327@gmail.com"
website = "https://unleafy.cn/"
github = "https://github.com/unleafy"
meta = "OIer"
avatar = "/images/logo.png"

[[config.topNav.links]]
label = "Home"
href = "/"

[[config.topNav.links]]
label = "Blog"
href = "/blog"

